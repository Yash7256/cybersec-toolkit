name: Deploy to Azure

on:
  push:
    branches:
      - main
      - develop

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: cybersec/web/ui/package-lock.json

      # Inject Clerk publishable key at build time so Vite embeds it in the
      # React bundle. VITE_CLERK_PUBLISHABLE_KEY must be added to GitHub
      # repository secrets (Settings → Secrets → Actions).
      # Use the LIVE key (pk_live_...) for production builds.
      - name: Build React frontend
        working-directory: cybersec/web/ui
        env:
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}
        run: |
          npm ci
          npm run build

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: |
          python -m pytest tests/ -q \
            --ignore=tests/core/tools/test_geoip_production.py \
            --ignore=tests/core/tools/whois \
            2>&1 | tail -5

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'cybersec-app'
          slot-name: 'production'
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: .

      - name: Azure logout
        run: |
          az logout
