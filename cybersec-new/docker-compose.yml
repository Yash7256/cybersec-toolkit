version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cybersec
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/cybersec
      APP_SECRET_KEY: change-this-in-production
      APP_DEBUG: "false"
      GROQ_API_KEY: ${GROQ_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./cybersec:/app/cybersec
    command: >
      sh -c "poetry run alembic upgrade head &&
             poetry run uvicorn cybersec.api.main:app
             --host 0.0.0.0 --port 8000 --workers 1"

volumes:
  postgres_data:
