services:
  # Redis sidecar removed — using Upstash hosted Redis (TLS).
  # REDIS_URL is set in .env and passed through via env_file.

  backend:
    build: .
    # host network mode: container shares the host network stack directly.
    # Required for rootless Podman (pasta/netavark) to reach external hosts.
    # sysctls are removed — they can't be set with network_mode: host.
    network_mode: host
    env_file:
      - .env
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      SCAN_TIMEOUT: 15.0
      OS_FINGERPRINT_TIMEOUT: 8.0
      SERVICE_DETECTION_TIMEOUT: 10.0
      WORKERS: 1
    restart: unless-stopped
