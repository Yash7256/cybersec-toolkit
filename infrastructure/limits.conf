# ── CyberSec Scanner: File Descriptor Limits ───────────────────────────
# Apply: copy to /etc/security/limits.d/90-cybersec.conf
# For Docker: add --ulimit nofile=1048576:1048576

# Raise FD limits for all users (scanner opens many sockets)
*                soft    nofile          1048576
*                hard    nofile          1048576

# Raise for root too (workers may run as root for SYN scans)
root             soft    nofile          1048576
root             hard    nofile          1048576
