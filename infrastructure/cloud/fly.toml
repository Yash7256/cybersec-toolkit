# Fly.io Configuration for CyberSec Backend
app = "cybersec-api"

primary_region = "lhr"  # London (change to your preferred region)

[env]
  PYTHONUNBUFFERED = "1"

[build]
  builder = "heroku"

[[services]]
  internal_port = 8000
  processes = ["app"]
  protocol = "tcp"

  [services.concurrency]
    hard_limit = 25
    soft_limit = 20

  [[services.ports]]
    handlers = ["http"]
    port = 80

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443

[checks]
  [checks.alive]
    grace_period = "30s"
    interval = "30s"
    method = "get"
    timeout = "5s"
    type = "http"
    uri = "/health"

[env.production]
  [env.production.env]
    SECRET_KEY = "change-me-in-production"

[[statics]]
  guest_path = "/app/dist"
  url_prefix = "/static"
