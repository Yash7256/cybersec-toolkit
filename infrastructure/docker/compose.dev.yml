services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cybersec
    ports:
      - "${POSTGRES_HOST_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis is not exposed to the host. Only reachable by other containers
  # on this network. Auth required via REDIS_PASSWORD.
  # maxmemory: caps Redis at 256MB so it can never consume unbounded host
  # memory. maxmemory-policy allkeys-lru: when full, evict the least-
  # recently-used keys first (safe here since everything we store in
  # Redis — CVE cache, WHOIS cache, SSE streams — is either reconstructable
  # from source data or short-lived; nothing in Redis is the system of
  # record). Adjust 256mb upward if cache hit-rate monitoring shows
  # frequent evictions under real load.
  redis:
    image: redis:7-alpine
    command: [
      "redis-server",
      "--requirepass", "${REDIS_PASSWORD}",
      "--maxmemory", "256mb",
      "--maxmemory-policy", "allkeys-lru"
    ]
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/cybersec
      APP_SECRET_KEY: change-this-in-production
      APP_DEBUG: "false"
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      WORKERS: 1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ../../cybersec:/app/cybersec
    command: >
      sh -c "poetry run alembic upgrade head &&
             poetry run uvicorn cybersec.apps.api.main:app
             --host 0.0.0.0 --port 8000 --workers 1"



volumes:
  postgres_data:
  redis_data:
