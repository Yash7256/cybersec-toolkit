# ── CyberSec Scanner: Kernel Network Tuning ────────────────────────────
# Apply: sudo sysctl -w -f infrastructure/sysctl.conf
# Permanent: copy to /etc/sysctl.d/90-cybersec.conf

# ── Ephemeral port range ───────────────────────────────────────────────
# Default: 32768-60999 (~28k ports)
# Raised:  10000-65535  (~55k ports)
# Each concurrent TCP connect scan burns one ephemeral port.
# With SO_LINGER abortive close, TIME_WAIT is avoided, but the port
# is still allocated during the connection. Wider range = higher ceiling.
net.ipv4.ip_local_port_range = 10000 65535

# ── TCP TIME_WAIT ──────────────────────────────────────────────────────
# Default: 60 seconds
# Lowering to 15s speeds up port recycling for scans.
# SAFETY: Only reduce if you understand that old duplicate segments
# may be accepted. For a scanning tool this is acceptable.
net.ipv4.tcp_fin_timeout = 15

# ── TIME_WAIT reuse (for outbound connections) ─────────────────────────
# 0 = disabled (default)
# 1 = reuse for new outbound connections when safe (RFC 1122 compliant)
# 2 = reuse for any outbound (aggressive)
# Setting to 1 is safe and effective for scanner outbound connections.
net.ipv4.tcp_tw_reuse = 1

# ── Connection backlog ─────────────────────────────────────────────────
# Max number of established connections waiting to be accepted.
# Higher values prevent dropped connections under burst load.
net.core.somaxconn = 65535

# ── TCP keepalive ──────────────────────────────────────────────────────
# How quickly dead connections are detected.
net.ipv4.tcp_keepalive_time = 120
net.ipv4.tcp_keepalive_intvl = 10
net.ipv4.tcp_keepalive_probes = 3

# ── Connection tracking ────────────────────────────────────────────────
# Max tracked connections (prevents nf_conntrack exhaustion under scan)
net.netfilter.nf_conntrack_max = 1048576
net.nf_conntrack_max = 1048576

# ── Outbound connection resilience ─────────────────────────────────────
# Faster TCP connection timeout for unreachable hosts
net.ipv4.tcp_syn_retries = 3
# TCP retransmission timeout initial value (ms)
net.ipv4.tcp_rto_min = 200

# ── Memory / buffer ────────────────────────────────────────────────────
# Increase max socket buffer size (for large scan result aggregation)
net.core.rmem_max = 134217728
net.core.wmem_max = 134217728
# Auto-tuning buffer range
net.ipv4.tcp_rmem = 4096 87380 134217728
net.ipv4.tcp_wmem = 4096 65536 134217728
